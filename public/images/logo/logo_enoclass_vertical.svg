<svg width="200" height="220" viewBox="0 0 200 220" xmlns="http://www.w3.org/2000/svg">
  <!-- Définition du dégradé bordeaux -->
  <defs>
    <linearGradient id="bordeauxGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6B1F3D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B2F4D;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Icône grappe de raisin centrée -->
  <g transform="translate(75, 20)">
    <!-- Grappe -->
    <circle cx="25" cy="15" r="9" fill="#6B1F3D"/>
    <circle cx="42" cy="15" r="9" fill="#6B1F3D"/>
    <circle cx="17" cy="30" r="9" fill="#8B2F4D"/>
    <circle cx="34" cy="30" r="9" fill="#8B2F4D"/>
    <circle cx="50" cy="30" r="9" fill="#8B2F4D"/>
    <circle cx="25" cy="45" r="9" fill="#8B2F4D"/>
    <circle cx="42" cy="45" r="9" fill="#8B2F4D"/>
    
    <!-- Feuille de vigne -->
    <path d="M 33 5 Q 29 0, 23 2 Q 19 4, 21 10 Q 23 14, 29 12 Q 31 11, 33 5 Z" 
          fill="#4A5D3F" opacity="0.9"/>
    <path d="M 33 5 Q 25 8, 27 12" stroke="#4A5D3F" stroke-width="1" fill="none" opacity="0.7"/>
    
    <!-- Tige -->
    <line x1="33" y1="5" x2="33" y2="13" stroke="#795548" stroke-width="2.5"/>
  </g>
  
  <!-- Texte "Éno" centré -->
  <text x="100" y="130" 
        font-family="'Cormorant Garamond', serif" 
        font-size="52" 
        font-weight="700" 
        fill="url(#bordeauxGradient)"
        text-anchor="middle">Éno</text>
  
  <!-- Texte "class" centré -->
  <text x="100" y="170" 
        font-family="'Poppins', sans-serif" 
        font-size="48" 
        font-weight="600" 
        fill="#566573"
        text-anchor="middle">class</text>
  
  <!-- Ligne de séparation dorée -->
  <line x1="50" y1="180" x2="150" y2="180" 
        stroke="#C5975C" 
        stroke-width="2"/>
  
  <!-- Baseline -->
  <text x="100" y="205" 
        font-family="'Poppins', sans-serif" 
        font-size="12" 
        font-weight="400" 
        fill="#566573"
        text-anchor="middle"
        letter-spacing="0.5">L'œnologie en ligne</text>
</svg>