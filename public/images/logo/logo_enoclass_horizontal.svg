<svg width="400" height="120" viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Définition du dégradé bordeaux -->
  <defs>
    <linearGradient id="bordeauxGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6B1F3D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B2F4D;stop-opacity:1" />
    </linearGradient>
    
    <!-- Ombre portée -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Icône grappe de raisin stylisée -->
  <g transform="translate(20, 30)">
    <!-- Grappe (7 raisins en disposition naturelle) -->
    <circle cx="25" cy="15" r="8" fill="#6B1F3D"/>
    <circle cx="40" cy="15" r="8" fill="#6B1F3D"/>
    <circle cx="17" cy="28" r="8" fill="#8B2F4D"/>
    <circle cx="33" cy="28" r="8" fill="#8B2F4D"/>
    <circle cx="48" cy="28" r="8" fill="#8B2F4D"/>
    <circle cx="25" cy="41" r="8" fill="#8B2F4D"/>
    <circle cx="40" cy="41" r="8" fill="#8B2F4D"/>
    
    <!-- Feuille de vigne -->
    <path d="M 32 5 Q 28 0, 22 2 Q 18 4, 20 10 Q 22 14, 28 12 Q 30 11, 32 5 Z" 
          fill="#4A5D3F" opacity="0.9"/>
    <path d="M 32 5 Q 24 8, 26 12" stroke="#4A5D3F" stroke-width="1" fill="none" opacity="0.7"/>
    
    <!-- Tige -->
    <line x1="32" y1="5" x2="32" y2="12" stroke="#795548" stroke-width="2"/>
  </g>
  
  <!-- Texte "Éno" (Cormorant Garamond) -->
  <text x="90" y="65" 
        font-family="'Cormorant Garamond', serif" 
        font-size="48" 
        font-weight="700" 
        fill="url(#bordeauxGradient)">Éno</text>
  
  <!-- Texte "class" (Poppins) -->
  <text x="170" y="65" 
        font-family="'Poppins', sans-serif" 
        font-size="48" 
        font-weight="600" 
        fill="#566573">class</text>
  
  <!-- Ligne de séparation dorée -->
  <line x1="90" y1="75" x2="310" y2="75" 
        stroke="#C5975C" 
        stroke-width="2"/>
  
  <!-- Baseline -->
  <text x="90" y="98" 
        font-family="'Poppins', sans-serif" 
        font-size="14" 
        font-weight="400" 
        fill="#566573"
        letter-spacing="1">L'œnologie en ligne</text>
</svg>