<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Fond rond bordeaux avec dégradé -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6B1F3D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B2F4D;stop-opacity:1" />
    </linearGradient>
    
    <!-- Ombre -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>
  
  <!-- Cercle de fond avec ombre -->
  <circle cx="100" cy="100" r="90" 
          fill="url(#bgGradient)" 
          filter="url(#shadow)"/>
  
  <!-- Grappe de raisin blanche/dorée -->
  <g transform="translate(57, 45)">
    <!-- Raisins -->
    <circle cx="30" cy="20" r="12" fill="#F5F1E8"/>
    <circle cx="53" cy="20" r="12" fill="#F5F1E8"/>
    <circle cx="19" cy="38" r="12" fill="#E8E0D0"/>
    <circle cx="42" cy="38" r="12" fill="#F5F1E8"/>
    <circle cx="64" cy="38" r="12" fill="#E8E0D0"/>
    <circle cx="30" cy="56" r="12" fill="#E8E0D0"/>
    <circle cx="53" cy="56" r="12" fill="#E8E0D0"/>
    <circle cx="42" cy="72" r="12" fill="#C5975C" opacity="0.8"/>
    
    <!-- Feuille de vigne dorée -->
    <path d="M 42 8 Q 37 1, 28 4 Q 23 7, 26 15 Q 29 21, 37 18 Q 40 16, 42 8 Z" 
          fill="#C5975C" opacity="0.9"/>
    <path d="M 42 8 Q 32 12, 35 18" 
          stroke="#C5975C" 
          stroke-width="1.5" 
          fill="none" 
          opacity="0.7"/>
    
    <!-- Tige -->
    <line x1="42" y1="8" x2="42" y2="17" 
          stroke="#C5975C" 
          stroke-width="3"
          stroke-linecap="round"/>
  </g>
  
  <!-- Lettre "É" stylisée en overlay (optionnel) -->
  <text x="100" y="145" 
        font-family="'Cormorant Garamond', serif" 
        font-size="60" 
        font-weight="700" 
        fill="#F5F1E8"
        text-anchor="middle"
        opacity="0.3">É</text>
</svg>