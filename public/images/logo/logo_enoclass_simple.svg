<svg width="350" height="80" viewBox="0 0 350 80" xmlns="http://www.w3.org/2000/svg">
  <!-- Version simplifiée pour header web -->
  <defs>
    <linearGradient id="bordeauxGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6B1F3D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B2F4D;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Icône grappe minimaliste -->
  <g transform="translate(10, 20)">
    <!-- 5 raisins en disposition compacte -->
    <circle cx="20" cy="10" r="7" fill="#6B1F3D"/>
    <circle cx="35" cy="10" r="7" fill="#6B1F3D"/>
    <circle cx="13" cy="23" r="7" fill="#8B2F4D"/>
    <circle cx="27.5" cy="23" r="7" fill="#8B2F4D"/>
    <circle cx="42" cy="23" r="7" fill="#8B2F4D"/>
    
    <!-- Feuille simple -->
    <path d="M 27 3 Q 23 -1, 18 1 Q 15 3, 17 8 Q 19 11, 24 9 Q 26 8, 27 3 Z" 
          fill="#4A5D3F" opacity="0.8"/>
    
    <!-- Tige fine -->
    <line x1="27" y1="3" x2="27" y2="8" stroke="#795548" stroke-width="1.5"/>
  </g>
  
  <!-- Texte "Énoclass" d'un seul tenant -->
  <text x="70" y="50" 
        font-family="'Poppins', sans-serif" 
        font-size="42" 
        font-weight="600" 
        fill="#2C1810">
    <tspan fill="url(#bordeauxGradient)" font-family="'Cormorant Garamond', serif" font-weight="700">Éno</tspan><tspan fill="#566573">class</tspan>
  </text>
</svg>