<svg width="400" height="120" viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Version monochrome (noir) -->
  
  <!-- Icône grappe de raisin stylisée -->
  <g transform="translate(20, 30)">
    <!-- Grappe -->
    <circle cx="25" cy="15" r="8" fill="#2C1810"/>
    <circle cx="40" cy="15" r="8" fill="#2C1810"/>
    <circle cx="17" cy="28" r="8" fill="#2C1810"/>
    <circle cx="33" cy="28" r="8" fill="#2C1810"/>
    <circle cx="48" cy="28" r="8" fill="#2C1810"/>
    <circle cx="25" cy="41" r="8" fill="#2C1810"/>
    <circle cx="40" cy="41" r="8" fill="#2C1810"/>
    
    <!-- Feuille de vigne -->
    <path d="M 32 5 Q 28 0, 22 2 Q 18 4, 20 10 Q 22 14, 28 12 Q 30 11, 32 5 Z" 
          fill="#2C1810" opacity="0.6"/>
    <path d="M 32 5 Q 24 8, 26 12" stroke="#2C1810" stroke-width="1" fill="none" opacity="0.6"/>
    
    <!-- Tige -->
    <line x1="32" y1="5" x2="32" y2="12" stroke="#2C1810" stroke-width="2"/>
  </g>
  
  <!-- Texte "Éno" (Cormorant Garamond) -->
  <text x="90" y="65" 
        font-family="'Cormorant Garamond', serif" 
        font-size="48" 
        font-weight="700" 
        fill="#2C1810">Éno</text>
  
  <!-- Texte "class" (Poppins) -->
  <text x="170" y="65" 
        font-family="'Poppins', sans-serif" 
        font-size="48" 
        font-weight="600" 
        fill="#2C1810">class</text>
  
  <!-- Ligne de séparation -->
  <line x1="90" y1="75" x2="310" y2="75" 
        stroke="#2C1810" 
        stroke-width="2"
        opacity="0.3"/>
  
  <!-- Baseline -->
  <text x="90" y="98" 
        font-family="'Poppins', sans-serif" 
        font-size="14" 
        font-weight="400" 
        fill="#2C1810"
        letter-spacing="1">L'œnologie en ligne</text>
</svg>