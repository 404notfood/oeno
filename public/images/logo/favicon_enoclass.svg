<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Favicon simplifié -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6B1F3D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B2F4D;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Fond carré arrondi -->
  <rect width="64" height="64" rx="12" fill="url(#bgGradient)"/>
  
  <!-- Grappe de raisin ultra-simplifiée -->
  <g transform="translate(17, 13)">
    <!-- 5 raisins -->
    <circle cx="8" cy="6" r="5" fill="#F5F1E8"/>
    <circle cx="20" cy="6" r="5" fill="#F5F1E8"/>
    <circle cx="2" cy="16" r="5" fill="#E8E0D0"/>
    <circle cx="14" cy="16" r="5" fill="#F5F1E8"/>
    <circle cx="26" cy="16" r="5" fill="#E8E0D0"/>
    <circle cx="8" cy="26" r="5" fill="#C5975C" opacity="0.9"/>
    <circle cx="20" cy="26" r="5" fill="#C5975C" opacity="0.9"/>
    
    <!-- Feuille minimaliste -->
    <path d="M 14 1 Q 11 -1, 8 0 Q 6 1, 7 4 Q 8 6, 11 5 Q 12 4, 14 1 Z" 
          fill="#C5975C" opacity="0.8"/>
    
    <!-- Tige -->
    <line x1="14" y1="1" x2="14" y2="4" 
          stroke="#C5975C" 
          stroke-width="1.5"
          stroke-linecap="round"/>
  </g>
</svg>